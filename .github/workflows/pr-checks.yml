name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest

    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            starts with an uppercase character.

  pr-lint:
    name: PR Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for merge conflicts
        run: |
          git fetch origin ${{ github.base_ref }}
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^<<<<<<< |^=======$|^>>>>>>> '; then
            echo "::error::Merge conflict markers found in changed files"
            exit 1
          fi
          echo "No merge conflict markers found"

      - name: Check for debug statements
        run: |
          if grep -r "console\.log\|debugger" --include="*.ts" --include="*.tsx" packages/ apps/ 2>/dev/null; then
            echo "::error::Found console.log or debugger statements"
            exit 1
          fi
          echo "No debug statements found"

      - name: Check file sizes
        run: |
          find . -type f -size +1M ! -path "*/node_modules/*" ! -path "*/.git/*" | while read file; do
            echo "::warning::Large file detected: $file ($(du -h "$file" | cut -f1))"
          done

  pr-labeler:
    name: Label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Label PR
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
